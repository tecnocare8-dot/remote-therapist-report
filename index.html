<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remote Therapist® Report System</title>

<style>
body { font-family: sans-serif; background:#f0f2f5; margin:0; padding-bottom:30px; }
.tab-menu { display:flex; position:sticky; top:0; background:#fff; z-index:1000; border-bottom:1px solid #ddd; }
.tab-btn { flex:1; padding:15px; border:none; background:none; font-weight:bold; cursor:pointer; color:#888; font-size:16px; }
.tab-btn.active { border-bottom:3px solid #1a73e8; color:#1a73e8; }
.container { max-width:600px; margin:15px auto; background:white; padding:20px; border-radius:12px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
.field-group { margin-bottom:35px; border-bottom:1px solid #eee; padding-bottom:20px; }
label { font-weight:bold; display:block; font-size:16px; margin-top:10px; color:#333; }
input, textarea, select { width:100%; padding:12px; margin-top:8px; border:1px solid #ccc; border-radius:8px; font-size:16px; box-sizing:border-box; }
.btn-send { width:100%; padding:18px; background:#1a73e8; color:white; border:none; border-radius:8px; font-size:18px; font-weight:bold; cursor:pointer; margin-top:20px; }
.search-area { background:#e8f0fe; padding:15px; border-radius:8px; margin-bottom:20px; border:1px solid #1a73e8; }
#loading { text-align:center; padding:50px; font-weight:bold; color:#666; }
.limit-guide { color:red; font-size:12px; margin-top:5px; font-weight:bold; }
.count-guide { font-size:12px; margin-top:5px; font-weight:bold; display:block; min-height:1.2em; }
.count-blue { color:blue; }
.count-red { color:red; }
.no-data-msg { color:#d93025; font-size:14px; font-weight:bold; padding:10px; border:1px dashed #d93025; border-radius:5px; text-align:center; }
</style>
</head>

<body>

<div class="tab-menu">
  <button class="tab-btn active" onclick="switchTab('input', this)">報告入力</button>
  <button class="tab-btn" onclick="switchTab('face', this)">Face情報</button>
</div>

<div id="tab-input" class="tab-content">
  <div class="container">

    <div class="search-area">
      <label>前回データ検索（メールアドレス）</label>
      <input type="email" id="search-email">
      <button type="button" class="btn-send" style="padding:10px;font-size:14px;" onclick="searchData()">検索して自動入力</button>
    </div>

    <div id="loading">接続中...</div>

    <form id="mainForm" style="display:none;">
      <div id="fields"></div>
      <button type="button" class="btn-send" onclick="sendData()">報告を送信する</button>
    </form>

  </div>
</div>

<div id="tab-face" class="tab-content" style="display:none;">
  <div class="container">
    <div id="face-img-area"></div>
  </div>
</div>

<script>
/* =========================================================
   ⚠️ ここからJS本体
   ※ 機能削除禁止・構文安全版
   ========================================================= */

const GAS_URL = "https://script.google.com/macros/s/AKfycbwbbEWSr5s_YV9d8CF87-1Uq7LeKMiqC1d1WfLwRf5kSg2axvwcz7MCYtUkZAdCo1Qz/exec";

const icf_data = { participation:[], activity:[], function:[] };
let currentConfig = [];

/* ---------- JSONP ---------- */
function callGAS(params, callback){
  const cb = "jsonp_" + Date.now();
  window[cb] = function(data){
    callback(data);
    delete window[cb];
    document.body.removeChild(script);
  };
  const query = Object.keys(params).map(k=>`${k}=${encodeURIComponent(params[k])}`).join("&");
  const script = document.createElement("script");
  script.src = `${GAS_URL}?${query}&callback=${cb}`;
  document.body.appendChild(script);
}

/* ---------- 初期化 ---------- */
window.onload = function(){
  callGAS({action:"init"}, function(data){
    icf_data.participation = data.participation_lists || [];
    icf_data.activity = data.activity_lists || [];
    icf_data.function = data.function_lists || [];
    currentConfig = data.config || [];
    render(currentConfig);
    document.getElementById("loading").style.display="none";
    document.getElementById("mainForm").style.display="block";
  });
};

/* ---------- レンダリング ---------- */
function render(config){
  const fields = document.getElementById("fields");
  const faceArea = document.getElementById("face-img-area");
  fields.innerHTML = "";
  faceArea.innerHTML = "";

  config.forEach(row=>{
    const name = row[0];
    const type = String(row[1]||"").toLowerCase();
    const options = row[2] ? String(row[2]).split(",") : [];
    const limit = row[3];
    const img = row[4];

    if(!name || name==="項目名" || name==="PDFリンク") return;

    /* Face / Movie は別タブ */
    if(type==="face" || type==="movie"){
      const box = document.createElement("div");
      box.innerHTML = `<label style="color:#1a73e8;">${name}</label>`;
      const hidden = document.createElement("input");
      hidden.type="hidden"; hidden.name=name; hidden.value=img||"";
      box.appendChild(hidden);
      const prev = document.createElement("div");
      updatePreview(prev,type,img);
      box.appendChild(prev);
      faceArea.appendChild(box);
      return;
    }

    const g = document.createElement("div");
    g.className="field-group";
    g.innerHTML = `<label>${name}</label>`;

    let el;
    if(type==="select"){
      el=document.createElement("select");
      el.innerHTML=`<option value="">-- 選択 --</option>`;
      options.forEach(o=>el.innerHTML+=`<option>${o}</option>`);
    }else if(type==="textarea"){
      el=document.createElement("textarea");
      el.rows=4;
      if(limit) el.maxLength=limit;
    }else{
      el=document.createElement("input");
      el.type = type==="email" ? "email" : "text";
    }
    el.name=name;
    g.appendChild(el);
    fields.appendChild(g);
  });
}

/* ---------- Preview ---------- */
function updatePreview(c,type,url){
  if(!url){ c.innerHTML='<div class="no-data-msg">なし</div>'; return;}
  if(type==="movie"){
    const id=url.split("v=").pop();
    c.innerHTML=`<iframe width="100%" height="200" src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>`;
  }else{
    const fid=url.match(/[-\w]{25,}/);
    if(fid){
      c.innerHTML=`<img src="https://drive.google.com/thumbnail?id=${fid[0]}&sz=w1000" style="width:100%;border-radius:8px;">`;
    }
  }
}

/* ---------- 検索 ---------- */
function searchData(){
  const email=document.getElementById("search-email").value;
  if(!email) return alert("メール必須");
  callGAS({action:"find",email},function(res){
    if(!res||!res.data) return alert("なし");
    Object.keys(res.data).forEach(k=>{
      const el=document.querySelector(`[name="${k}"]`);
      if(el) el.value=res.data[k];
    });
    alert("読込完了");
  });
}

/* ---------- 送信 ---------- */
function sendData(){
  if(!confirm("送信しますか？")) return;
  const payload={};
  document.querySelectorAll("#mainForm [name]").forEach(e=>payload[e.name]=e.value);
  fetch(GAS_URL,{method:"POST",body:JSON.stringify(payload),mode:"no-cors"});
  alert("送信しました");
}

/* ---------- タブ ---------- */
function switchTab(id,btn){
  document.querySelectorAll(".tab-content").forEach(e=>e.style.display="none");
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("tab-"+id).style.display="block";
  btn.classList.add("active");
}
</script>

</body>
</html>
