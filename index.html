<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Therapist® Report System</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding-bottom: 30px; }
        .tab-menu { display: flex; position: sticky; top: 0; background: #fff; z-index: 1000; border-bottom: 1px solid #ddd; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; font-weight: bold; cursor: pointer; color: #888; font-size: 16px; }
        .tab-btn.active { border-bottom: 3px solid #1a73e8; color: #1a73e8; }
        .container { max-width: 600px; margin: 15px auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .page-header { background: #1a73e8; color: white; padding: 15px; text-align: center; border-radius: 12px 12px 0 0; margin-bottom: -10px; }
        .brand-label { font-size: 11px; opacity: 0.8; letter-spacing: 0.1em; margin-bottom: 4px; display: block; font-weight: bold; }
        .page-header h1 { margin: 0; font-size: 19px; letter-spacing: 0.02em; line-height: 1.4; }

        .field-group { margin-bottom: 35px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        label { font-weight: bold; display: block; font-size: 16px; margin-top: 10px; color: #333; }
        
        input:not([type="checkbox"]), textarea, select { 
            width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ccc; 
            border-radius: 8px; font-size: 16px; box-sizing: border-box; 
            background-color: #fff; -webkit-appearance: none; transition: background-color 0.4s ease;
        }

        /* 自動入力時のフラッシュ演出 */
        .flash-active { background-color: #fff9c4 !important; }

        .btn-send { width: 100%; padding: 18px; background: #1a73e8; color: white; border:none; border-radius:8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        #loading { text-align: center; padding: 50px; font-weight: bold; color: #666; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; font-weight: bold; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.3); border-top: 5px solid white; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .modal-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 3000; display: none; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 85%; max-width: 400px; text-align: center; }
        .modal-btn { background: #1a73e8; color: white; border: none; padding: 10px 20px; border-radius: 6px; margin-top: 20px; cursor: pointer; font-weight: bold; width: 100%; }
        .media-label { background: #e8f0fe; color: #1a73e8; padding: 5px 10px; border-radius: 4px; font-size: 14px; font-weight: bold; display: inline-block; margin-bottom: 10px; }
        
        .auto-fill-hint { font-size: 11px; color: #1a73e8; margin-top: 4px; display: block; font-weight: normal; }
    </style>
</head>
<body>

<div id="overlay"><div class="spinner"></div><div>データを送信・PDFを生成中...</div></div>
<div id="modal-bg" class="modal-bg"><div class="modal-content"><p id="modal-text"></p><button class="modal-btn" onclick="closeModal()">OK</button></div></div>

<div class="tab-menu">
    <button class="tab-btn active" onclick="switchTab('input', this)">報告入力</button>
    <button class="tab-btn" onclick="switchTab('face', this)">Face情報</button>
</div>

<div id="tab-input" class="tab-content">
    <div class="container" style="padding:0; overflow:hidden;">
        <div class="page-header">
            <span class="brand-label">Remote Therapist®</span>
            <h1 id="display-title">レポートシステム</h1>
        </div>
        
        <div style="padding:20px;">
            <div id="loading">設定をロード中...</div>
            <form id="mainForm" style="display:none;">
                <div id="fields"></div>
                <button type="button" class="btn-send" onclick="sendData()">報告を送信・PDF生成</button>
            </form>
        </div>
    </div>
</div>

<div id="tab-face" class="tab-content" style="display:none;"><div class="container"><div id="face-img-area"></div></div></div>

<script>
/**
 * ★ 設定
 */
const activeFormId = "a"; 
const GAS_URL = "https://script.google.com/macros/s/AKfycbwVq4vMvZOYAmFanju-SyJPN6W3KjtJ9yIlrwhjsBbk6ZOD6_uewwp3x2w6-kPZO6c8/exec"; 

let icf_data = { participation: [], activity: [], function: [] };
let masterExerciseList = []; 

function showMsg(text) { document.getElementById('modal-text').innerText = text; document.getElementById('modal-bg').style.display = 'flex'; }
function closeModal() { document.getElementById('modal-bg').style.display = 'none'; }

function callGAS(params, callback) {
    const id = 'jsonp_' + Date.now();
    window[id] = (data) => { callback(data); document.body.removeChild(document.getElementById(id)); delete window[id]; };
    const script = document.createElement('script'); script.id = id;
    const query = Object.keys(params).map(k => k + '=' + encodeURIComponent(params[k])).join('&');
    script.src = `${GAS_URL}?${query}&callback=${id}`;
    document.body.appendChild(script);
}

window.onload = () => {
    callGAS({ action: 'init', id: activeFormId }, (data) => {
        icf_data.participation = data.participation_lists || [];
        icf_data.activity = data.activity_lists || [];
        icf_data.function = data.function_lists || [];
        masterExerciseList = data.exercise_lists || []; 
        
        const configRows = data.config || [];
        const headers = configRows[0];
        
        // 1. 自分のフォーム用の「順番列」を特定 (Form_a 等)
        const orderColIdx = headers.findIndex(h => String(h).toLowerCase().trim() === "form_" + activeFormId);
        
        if (orderColIdx === -1) {
            document.getElementById('loading').innerText = "エラー: Configに 'Form_" + activeFormId + "' 列がありません。";
            return;
        }

        // 2. タイトルの設定 (A列が form_title_a 等の行を探す)
        const titleKey = "form_title_" + activeFormId;
        const titleRow = configRows.find(row => String(row[0]).toLowerCase().trim() === titleKey);
        if (titleRow && titleRow[5]) { // 設定値はF列(Index 5)
            const finalTitle = String(titleRow[5]).trim();
            document.getElementById('display-title').innerText = finalTitle;
            document.title = finalTitle;
        }

        // 3. 表示項目のフィルタリングと並び替え
        // ルール：順番列（Form_a列）に数字が入っているものだけを抽出し、その数字順に並べる
        let displayConfig = [];
        for (let i = 1; i < configRows.length; i++) {
            const row = configRows[i];
            const orderVal = row[orderColIdx];
            const orderNum = Number(orderVal);

            // 数字が入っていない（空欄または文字）項目は、このフォームでは「非表示」
            if (orderVal !== "" && !isNaN(orderNum)) {
                displayConfig.push({
                    data: row,
                    order: orderNum
                });
            }
        }

        // 小さい順にソート
        displayConfig.sort((a, b) => a.order - b.order);

        // 描画
        render(displayConfig.map(item => item.data));
        updateFaceTab(displayConfig.map(item => item.data));
        
        document.getElementById('loading').style.display = 'none';
        document.getElementById('mainForm').style.display = 'block';
    });
};

function render(configRows) {
    const fieldsDiv = document.getElementById('fields');
    fieldsDiv.innerHTML = '';
    
    configRows.forEach(row => {
        const name = row[0], type = String(row[1]).trim().toLowerCase(), url = row[4], options = row[2] ? String(row[2]).split(',') : [];
        if (!name || name === "項目名" || name.includes("templateid") || name.includes("form_title")) return;

        // 隠しフィールド
        if (type === 'face' || type === 'movie' || name.includes('優先')) {
            fieldsDiv.appendChild(Object.assign(document.createElement('input'), { type: 'hidden', name: name, value: url || "" }));
            return;
        }

        const group = document.createElement('div'); group.className = 'field-group';
        
        // ガイド画像
        if (url && url.startsWith('http')) {
            const imgIdMatch = url.match(/[-\w]{25,}/);
            const src = imgIdMatch ? `https://drive.google.com/thumbnail?id=${imgIdMatch[0]}&sz=w1000` : url;
            const img = document.createElement('img');
            img.src = src; img.style = "width:100%; border-radius:8px; margin-bottom:10px; border:1px solid #ddd; display:block;";
            group.appendChild(img);
        }

        group.appendChild(Object.assign(document.createElement('label'), { innerText: name }));
        
        let input;
        if (type === 'select' || options.length > 0) {
            input = document.createElement('select'); input.add(new Option("-- 選択 --", ""));
            options.forEach(o => { if(o.trim()) input.add(new Option(o.trim(), o.trim())); });
            
            // 運動課題の自動連動
            if (name.endsWith("_課題")) {
                input.addEventListener('change', (e) => handleTaskAutoFill(e.target));
                const hint = document.createElement('span');
                hint.className = 'auto-fill-hint';
                hint.innerText = "※選択すると「推奨目的」が自動入力されます";
                group.appendChild(hint);
            }
        } else if (type === 'textarea') {
            input = document.createElement('textarea'); input.rows = 4;
        } else {
            input = document.createElement('input'); input.type = (type === 'email') ? 'email' : 'text';
        }
        
        input.name = name;
        group.appendChild(input);
        fieldsDiv.appendChild(group);
    });
}

function handleTaskAutoFill(selectEl) {
    const taskName = selectEl.value;
    const prefix = selectEl.name.split('_')[0]; 
    const targetName = prefix + "_運動の目的";
    const targetInput = document.querySelector(`[name="${targetName}"]`);
    if (!taskName || !targetInput) return;

    const foundRow = masterExerciseList.slice(1).find(row => {
        const rowCat = String(row[0]).trim();
        const rowTask = String(row[1]).trim();
        return (rowCat.includes(prefix) || prefix.includes(rowCat)) && rowTask === taskName;
    });

    if (foundRow && foundRow[5]) {
        targetInput.value = foundRow[5];
        targetInput.classList.add('flash-active');
        setTimeout(() => { targetInput.classList.remove('flash-active'); }, 600);
    }
}

function updateFaceTab(configRows) {
    const area = document.getElementById('face-img-area');
    area.innerHTML = "<h3>患者詳細情報（Face・動画）</h3>";
    configRows.filter(r => String(r[1]).trim().toLowerCase() === 'face' || String(r[1]).trim().toLowerCase() === 'movie').forEach(r => {
        const lbl = document.createElement('div'); lbl.className = 'media-label'; lbl.innerText = r[0]; area.appendChild(lbl);
        // (簡易表示: 実際は画像や動画を表示)
    });
}

function sendData() {
    if (!confirm("送信しますか？")) return;
    document.getElementById('overlay').style.display = 'flex';
    const payload = { "formid": activeFormId }; 
    document.querySelectorAll('#mainForm [name]').forEach(el => payload[el.name] = el.value);
    fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) })
    .then(r => r.text()).then(res => {
        document.getElementById('overlay').style.display = 'none';
        showMsg(res.includes("SUCCESS") ? "送信完了しました。" : "エラー: " + res);
    });
}

function switchTab(id, btn) {
    document.querySelectorAll('.tab-content').forEach(e => e.style.display = 'none');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + id).style.display = 'block';
    btn.classList.add('active');
}
</script>
</body>
</html>
