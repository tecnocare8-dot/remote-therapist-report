<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Therapist® Report System</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding-bottom: 30px; }
        .tab-menu { display: flex; position: sticky; top: 0; background: #fff; z-index: 1000; border-bottom: 1px solid #ddd; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; font-weight: bold; cursor: pointer; color: #888; font-size: 16px; }
        .tab-btn.active { border-bottom: 3px solid #1a73e8; color: #1a73e8; }
        .container { max-width: 600px; margin: 15px auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .field-group { margin-bottom: 35px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        label { font-weight: bold; display: block; font-size: 16px; margin-top: 10px; color: #333; }
        input, textarea, select { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .btn-send { width: 100%; padding: 18px; background: #1a73e8; color: white; border:none; border-radius:8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .search-area { background: #e8f0fe; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #1a73e8; }
        #loading { text-align: center; padding: 50px; font-weight: bold; color: #666; }
        .limit-guide { color: red; font-size: 12px; margin-top: 5px; font-weight: bold; }
        .count-guide { font-size: 12px; margin-top: 5px; font-weight: bold; display: block; min-height: 1.2em; }
        .no-data-msg { color: #d93025; font-size: 14px; font-weight: bold; padding: 10px; border: 1px dashed #d93025; border-radius: 5px; text-align: center; }
        .pdf-viewer { width: 100%; height: 500px; border: 1px solid #ccc; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="tab-menu">
        <button class="tab-btn active" onclick="switchTab('input', this)">報告入力</button>
        <button class="tab-btn" onclick="switchTab('face', this)">Face情報</button>
    </div>

    <div id="tab-input" class="tab-content">
        <div class="container">
            <div class="search-area">
                <label>前回データ検索（メールアドレス）</label>
                <input type="email" id="search-email" placeholder="example@gmail.com">
                <button type="button" class="btn-send" style="padding:10px; font-size:14px;" onclick="searchData()">検索して自動入力</button>
            </div>
            <div id="loading">接続中...</div>
            <form id="mainForm" style="display:none;">
                <input type="hidden" name="rowNum" id="rowNum">
                <div id="fields"></div>
                <button type="button" class="btn-send" onclick="sendData()">報告を送信する</button>
            </form>
        </div>
    </div>

    <div id="tab-face" class="tab-content" style="display:none;">
        <div class="container">
            <div id="pdf-area" style="margin-bottom: 30px; display:none;">
                <label style="color:#d93025; margin-bottom:10px;">【最新の作成済みPDF】</label>
                <iframe id="pdf-frame" class="pdf-viewer" src=""></iframe>
            </div>
            <hr>
            <div id="face-img-area"></div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycby4ojSHIQ78v6lQCvRBwpYtUF_o88YTJyAAPwLtFqAqegyS5JHIA2cOAjYot8CLbygJ/exec"; 
        let currentConfig = [], lists = [], function_lists = [], activity_lists = [];

        function callGAS(params, callback) {
            const id = 'jsonp_' + Date.now();
            window[id] = (data) => {
                callback(data);
                const el = document.getElementById(id);
                if (el) document.body.removeChild(el);
                delete window[id];
            };
            const script = document.createElement('script');
            script.id = id;
            const query = Object.keys(params).map(k => k + '=' + encodeURIComponent(params[k])).join('&');
            script.src = `${GAS_URL}?${query}&callback=${id}`;
            document.body.appendChild(script);
        }

        window.onload = () => {
            callGAS({ action: 'init' }, (data) => {
                lists = data.lists || [];
                function_lists = data.function_lists || []; 
                activity_lists = data.activity_lists || []; 
                currentConfig = data.config || [];
                render(currentConfig);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('mainForm').style.display = 'block';
                setTimeout(updateTotalCount, 500);
            });
        };

        function render(config) {
            const fieldsDiv = document.getElementById('fields');
            const faceArea = document.getElementById('face-img-area');
            fieldsDiv.innerHTML = ''; faceArea.innerHTML = '';
            
            config.forEach(row => {
                let name = row[0], type = String(row[1]).trim().toLowerCase(), options = row[2] ? String(row[2]).split(',') : [], limit = row[3], imgUrl = row[4];
                if (!name || name === "項目名" || name === "PDFリンク") return;

                if (type === 'face' || type === 'movie' || (name === "ニックネーム" && imgUrl)) {
                    const g = document.createElement('div'); g.style.marginBottom = "25px";
                    g.innerHTML = `<label style="color:#1a73e8;">${name}</label>`;
                    
                    const hidden = document.createElement('input');
                    hidden.type = 'hidden'; hidden.name = name; hidden.id = `hidden-${name}`;
                    hidden.value = imgUrl || ""; // 初期表示はconfig
                    fieldsDiv.appendChild(hidden);

                    const previewDiv = document.createElement('div');
                    previewDiv.id = `preview-container-${name}`;
                    updatePreview(previewDiv, type, imgUrl);
                    
                    g.appendChild(previewDiv);
                    faceArea.appendChild(g);
                    if (type === 'face' || type === 'movie') return;
                }

                const group = document.createElement('div'); group.className = 'field-group';
                group.appendChild(Object.assign(document.createElement('label'), { innerText: name }));

                let input;
                if (type.includes('_major') || type.includes('_middle') || type.includes('_minor')) {
                    input = document.createElement('select');
                    input.dataset.group = name.replace(/_ICF(大|中|小)$/, '').trim();
                    input.dataset.lv = type.split('_')[1];
                    input.dataset.source = type.startsWith('activity') ? 'activity' : (type.startsWith('function') ? 'function' : 'master');
                    input.addEventListener('change', (e) => { syncICF(e.target); updateTotalCount(); });
                } else if (type === 'select' || options.length > 0) {
                    input = document.createElement('select'); input.add(new Option("-- 選択 --", ""));
                    options.forEach(o => { if(o.trim()) input.add(new Option(o.trim(), o.trim())); });
                    input.addEventListener('change', updateTotalCount);
                } else if (type === 'textarea') {
                    input = document.createElement('textarea'); input.rows = 4;
                } else {
                    input = document.createElement('input'); input.type = (type === 'email') ? 'email' : 'text';
                    input.addEventListener('input', updateTotalCount);
                }
                input.name = name;
                group.appendChild(input);

                if (limit && !isNaN(limit) && (type === 'textarea' || type === 'text' || type === '')) {
                    group.appendChild(Object.assign(document.createElement('div'), { className: 'limit-guide', innerText: `文字数上限 ${limit} 文字` }));
                }
                if (name.includes('計画書へ転記')) {
                    group.appendChild(Object.assign(document.createElement('div'), { className: 'count-guide count-blue', id: `guide-${name}`, innerText: "0 / 3 選択中" }));
                }
                fieldsDiv.appendChild(group);
            });
            initICF();
        }

        // プレビュー表示を更新する関数（データがない場合はメッセージを出す）
        function updatePreview(container, type, url) {
            container.innerHTML = "";
            if (!url || url.trim() === "" || url === "作成中 (数分後に再検索してください)") {
                container.innerHTML = '<div class="no-data-msg">データが見当たりませんでした</div>';
                return;
            }
            if (type === 'movie') {
                const vId = url.split('v=')[1] || url.split('/').pop().split('?')[0];
                container.innerHTML = `<iframe width="100%" height="200" src="https://www.youtube.com/embed/${vId}" frameborder="0" allowfullscreen></iframe>`;
            } else {
                const img = document.createElement('img');
                img.src = getThumb(url);
                img.style.width = "100%"; img.style.borderRadius = "8px";
                container.innerHTML = "";
                container.appendChild(img);
            }
        }

        async function searchData() {
            const email = document.getElementById('search-email').value;
            if (!email) return alert("アドレス入力");
            callGAS({ action: 'find', email: email }, async (res) => {
                if (!res || !res.data) return alert("過去データなし");
                const data = res.data;
                document.getElementById('rowNum').value = res.rowNum;

                const pdfFrame = document.getElementById('pdf-frame');
                if (data["PDFリンク"] && data["PDFリンク"].includes("drive.google.com")) {
                    const pdfId = data["PDFリンク"].match(/[-\w]{25,}/);
                    pdfFrame.src = `https://drive.google.com/file/d/${pdfId[0]}/preview`;
                    document.getElementById('pdf-area').style.display = 'block';
                } else {
                    document.getElementById('pdf-area').style.display = 'none';
                }

                // 【原則】dataにあるURLを忠実に再現。なければ「データなし」
                ['face情報', '動画'].forEach(key => {
                    const h = document.getElementById(`hidden-${key}`);
                    const c = document.getElementById(`preview-container-${key}`);
                    const type = key === '動画' ? 'movie' : 'face';
                    
                    // dataシートの値を隠しフィールドにセット（空なら空をセット）
                    const targetUrl = data[key] || "";
                    if (h) h.value = targetUrl;
                    if (c) updatePreview(c, type, targetUrl);
                });

                document.querySelectorAll('#mainForm [name]').forEach(el => {
                    if (data[el.name] !== undefined && !el.dataset.lv) el.value = data[el.name];
                });

                const icfMajors = Array.from(document.querySelectorAll('select[data-lv="major"]'));
                for (const major of icfMajors) {
                    const g = major.dataset.group;
                    const middle = document.querySelector(`select[data-group="${g}"][data-lv="middle"]`);
                    const minor = document.querySelector(`select[data-group="${g}"][data-lv="minor"]`);
                    if (data[major.name]) {
                        major.value = String(data[major.name]).trim();
                        syncICF(major);
                        await pollForValue(middle, String(data[middle.name] || "").trim());
                        if (middle && middle.value && data[minor.name]) {
                            syncICF(middle);
                            await pollForValue(minor, String(data[minor.name] || "").trim());
                        }
                    }
                }
                updateTotalCount();
                alert("読み込み完了");
            });
        }

        function sendData() {
            const btn = document.querySelector('.btn-send');
            btn.disabled = true; btn.innerText = "送信中...";
            const payload = {};
            document.querySelectorAll('#mainForm [name]').forEach(el => { payload[el.name] = el.value; });

            const overlay = document.createElement('div');
            overlay.style = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.95);z-index:9999;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;font-size:1.2rem;font-weight:bold;color:#1a73e8;padding:20px;";
            overlay.innerHTML = `<div>✓ 送信を受け付けました</div><div style="margin-top:15px;">ただいまPDFを作成中です。<br>数分後に呼び出して確認してください。</div>`;
            document.body.appendChild(overlay);

            fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
            setTimeout(() => { location.reload(); }, 3500);
        }

        // --- 共通関数群 ---
        function pollForValue(selectEl, val) {
            if (!val) return Promise.resolve();
            return new Promise((resolve) => {
                let count = 0;
                const itv = setInterval(() => {
                    if (Array.from(selectEl.options).some(o => o.value === val)) {
                        selectEl.value = val;
                        clearInterval(itv); resolve();
                    } else if (count > 30) { clearInterval(itv); resolve(); }
                    count++;
                }, 100);
            });
        }
        function getThumb(url) {
            const id = url ? url.match(/[-\w]{25,}/) : null;
            return id ? `https://drive.google.com/thumbnail?id=${id[0]}&sz=w1000` : "";
        }
        function syncICF(target) {
            const list = (target.dataset.source === 'activity' ? activity_lists : (target.dataset.source === 'function' ? function_lists : lists));
            const g = target.dataset.group, lv = target.dataset.lv;
            const major = document.querySelector(`select[data-group="${g}"][data-lv="major"]`);
            const middle = document.querySelector(`select[data-group="${g}"][data-lv="middle"]`);
            const minor = document.querySelector(`select[data-group="${g}"][data-lv="minor"]`);
            if (lv === 'major' && middle) {
                middle.innerHTML = '<option value="">-- 選択 --</option>';
                const filtered = list.filter(r => String(r[0]).trim() === String(target.value).trim());
                [...new Set(filtered.map(r => String(r[1]).trim()))].filter(v => v).forEach(v => middle.add(new Option(v, v)));
            } else if (lv === 'middle' && minor) {
                minor.innerHTML = '<option value="">-- 選択 --</option>';
                list.filter(r => String(r[0]).trim() === String(major.value).trim() && String(r[1]).trim() === String(target.value).trim())
                    .forEach(r => { if(r[2]) minor.add(new Option(String(r[2]).trim(), String(r[2]).trim())); });
            }
        }
        function initICF() {
            document.querySelectorAll('select[data-lv="major"]').forEach(el => {
                const list = (el.dataset.source === 'activity' ? activity_lists : (el.dataset.source === 'function' ? function_lists : lists));
                el.innerHTML = '<option value="">-- 選択 --</option>';
                [...new Set(list.map(r => String(r[0]).trim()))].filter(v => v).forEach(v => el.add(new Option(v, v)));
            });
        }
        function updateTotalCount() {
            let total = 0;
            const max = 3;
            const tenkiSelects = document.querySelectorAll('select[name*="計画書へ転記"]');
            tenkiSelects.forEach(sel => { if (sel.value === "転記する") total++; });
            tenkiSelects.forEach(sel => {
                const guide = document.getElementById(`guide-${sel.name}`);
                if (guide) {
                    guide.innerText = (sel.value === "転記する") ? `${total} / ${max} 選択中` : "0 / 3 選択中";
                    guide.className = (sel.value === "転記する" && total > max) ? 'count-guide count-red' : 'count-guide count-blue';
                }
            });
        }
        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(e => e.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + id).style.display = 'block'; btn.classList.add('active');
        }
    </script>
</body>
</html>
