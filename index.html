<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Therapist® Report System</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding-bottom: 30px; }
        .tab-menu { display: flex; position: sticky; top: 0; background: #fff; z-index: 1000; border-bottom: 1px solid #ddd; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; font-weight: bold; cursor: pointer; color: #888; font-size: 16px; }
        .tab-btn.active { border-bottom: 3px solid #1a73e8; color: #1a73e8; }
        .container { max-width: 600px; margin: 15px auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .field-group { margin-bottom: 35px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        label { font-weight: bold; display: block; font-size: 16px; margin-top: 10px; color: #333; }
        input, textarea, select { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .btn-send { width: 100%; padding: 18px; background: #1a73e8; color: white; border:none; border-radius:8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .search-area { background: #e8f0fe; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #1a73e8; }
        #loading { text-align: center; padding: 50px; font-weight: bold; color: #666; }
        #pdf-viewer { width: 100%; height: 600px; border: 1px solid #ccc; margin-top: 10px; display: none; border-radius: 8px; }
        
        /* ガイド表示用スタイル */
        .limit-guide { color: red; font-size: 12px; margin-top: 5px; font-weight: bold; }
        /* 初期は青文字、上限超過で赤文字にJSで動的変更 */
        .count-guide { font-size: 12px; margin-top: 5px; font-weight: bold; display: block; min-height: 1.2em; }
        .count-blue { color: blue; }
        .count-red { color: red; }
    </style>
</head>
<body>
    <div class="tab-menu">
        <button class="tab-btn active" onclick="switchTab('input', this)">報告入力</button>
        <button class="tab-btn" onclick="switchTab('face', this)">Face情報</button>
    </div>

    <div id="tab-input" class="tab-content">
        <div class="container">
            <div class="search-area">
                <label>前回データ検索（メールアドレス）</label>
                <input type="email" id="search-email" placeholder="example@gmail.com">
                <button type="button" class="btn-send" style="padding:10px; font-size:14px;" onclick="searchData()">検索して自動入力</button>
            </div>
            <div id="loading">接続中...</div>
            <form id="mainForm" style="display:none;">
                <input type="hidden" name="rowNum" id="rowNum">
                <div id="fields"></div>
                <button type="button" class="btn-send" onclick="sendData()">報告を送信する</button>
            </form>
        </div>
    </div>

    <div id="tab-face" class="tab-content" style="display:none;">
        <div class="container">
            <iframe id="pdf-viewer"></iframe>
            <div id="face-img-area"></div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzO5_l5thBARfCEhmRVRzCfF843IG7EgjmK9Bpb3G2mlo5t-pyQPDiYqCnVKykSb0Vr/exec"; 
        let lists = [], function_lists = [], activity_lists = [], currentConfig = [];

        function callGAS(params, callback) {
            const id = 'jsonp_' + Date.now();
            window[id] = (data) => {
                callback(data);
                const el = document.getElementById(id);
                if (el) document.body.removeChild(el);
                delete window[id];
            };
            const script = document.createElement('script');
            script.id = id;
            const query = Object.keys(params).map(k => k + '=' + encodeURIComponent(params[k])).join('&');
            script.src = `${GAS_URL}?${query}&callback=${id}`;
            document.body.appendChild(script);
        }

        window.onload = () => {
            callGAS({ action: 'init' }, (data) => {
                lists = data.lists || [];
                function_lists = data.function_lists || []; 
                activity_lists = data.activity_lists || []; 
                currentConfig = data.config || [];
                render(currentConfig);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('mainForm').style.display = 'block';
            });
        };

        function render(config) {
            const fieldsDiv = document.getElementById('fields');
            const faceArea = document.getElementById('face-img-area');
            fieldsDiv.innerHTML = ''; faceArea.innerHTML = '';
            
            config.forEach(row => {
                let name = row[0], type = String(row[1]).trim().toLowerCase(), options = row[2] ? String(row[2]).split(',') : [], limit = row[3], imgUrl = row[4];
                if (!name || name === "項目名" || name === "PDFリンク") return;

                // ニックネーム・Face表示（初期順序遵守）
                if (type === 'face' || type === 'movie' || (name === "ニックネーム" && imgUrl)) {
                    const g = document.createElement('div'); g.style.marginBottom = "25px";
                    g.innerHTML = `<label style="color:#1a73e8;">${name}</label>`;
                    if (type === 'movie' && imgUrl) {
                        const vId = imgUrl.split('v=')[1] || imgUrl.split('/').pop().split('?')[0];
                        g.innerHTML += `<iframe width="100%" height="200" src="https://www.youtube.com/embed/${vId}" frameborder="0" allowfullscreen></iframe>`;
                    } else if (imgUrl) {
                        const img = document.createElement('img'); img.src = getThumb(imgUrl);
                        img.onerror = () => { img.style.display='none'; };
                        g.appendChild(img);
                    }
                    faceArea.appendChild(g);
                    if (type === 'face' || type === 'movie') return;
                }

                const group = document.createElement('div'); group.className = 'field-group';
                const lbl = document.createElement('label'); lbl.innerText = name;
                group.appendChild(lbl);

                let input;
                if (type.includes('_major') || type.includes('_middle') || type.includes('_minor')) {
                    input = document.createElement('select');
                    input.dataset.group = name.split('_')[0].trim();
                    input.dataset.lv = type.split('_')[1];
                    input.dataset.source = type.startsWith('activity') ? 'activity' : (type.startsWith('function') ? 'function' : 'master');
                    input.addEventListener('change', (e) => {
                        syncICF(e.target);
                        updateTotalCount();
                    });
                } else if (type === 'textarea') {
                    input = document.createElement('textarea'); input.rows = 4;
                } else if (type === 'select' || options.length > 0) {
                    input = document.createElement('select'); input.add(new Option("-- 選択 --", ""));
                    options.forEach(o => { if(o.trim()) input.add(new Option(o.trim(), o.trim())); });
                    input.addEventListener('change', updateTotalCount);
                } else {
                    input = document.createElement('input'); input.type = (type === 'email') ? 'email' : 'text';
                }
                
                input.name = name;
                group.appendChild(input);

                // 文字数ガイド表示（赤字）
                if (limit && !isNaN(limit) && (type === 'textarea' || type === 'text' || type === '')) {
                    const guide = document.createElement('div'); guide.className = 'limit-guide';
                    guide.innerText = `文字数上限 ${limit} 文字`;
                    group.appendChild(guide);
                }

                // 選択数カウント領域（青字初期表示：0/3）
                if (name.includes('計画書へ転記')) {
                    const countGuide = document.createElement('div');
                    countGuide.className = 'count-guide count-blue';
                    countGuide.id = `guide-${name}`;
                    group.appendChild(countGuide);
                }

                fieldsDiv.appendChild(group);
            });
            initICF();
            updateTotalCount(); // 初期表示 0/3 を実行
        }

        function updateTotalCount() {
            const targetGroups = ["体幹", "肩", "肘手首", "ひざ", "股関節", "生活動作"];
            let currentTotal = 0;
            const limitRow = currentConfig.find(row => row[0] === '課題選択上限');
            const max = limitRow ? parseInt(limitRow[3]) : 3;

            targetGroups.forEach(g => {
                const tenki = document.querySelector(`[name="${g}_計画書へ転記"]`);
                const task = document.querySelector(`[name="${g}_課題"]`);
                // 転記するかつ、課題が空でない場合にカウント
                if (tenki && tenki.value === "転記する" && task && task.value && task.value !== "" && task.value !== "-- 選択 --") {
                    currentTotal++;
                }
            });

            targetGroups.forEach(g => {
                const guide = document.getElementById(`guide-${g}_計画書へ転記`);
                const tenki = document.querySelector(`[name="${g}_計画書へ転記"]`);
                if (guide) {
                    if (tenki && tenki.value === "転記する") {
                        guide.innerText = `${currentTotal} / ${max} 選択中`;
                        // 3件を超えたら赤字、それ以下は青字
                        if (currentTotal > max) {
                            guide.className = 'count-guide count-red';
                        } else {
                            guide.className = 'count-guide count-blue';
                        }
                    } else {
                        guide.innerText = "";
                    }
                }
            });
            if (currentTotal > max) alert(`最大${max}件までです。現在: ${currentTotal}件`);
        }

        function getListBySource(src) {
            if (src === 'activity') return activity_lists;
            if (src === 'function') return function_lists;
            return lists;
        }

        function initICF() {
            document.querySelectorAll('select[data-lv="major"]').forEach(el => {
                const list = getListBySource(el.dataset.source);
                el.innerHTML = '<option value="">-- 選択 --</option>';
                [...new Set(list.slice(1).map(r => r[0]))].filter(v => v).forEach(v => {
                    const cv = String(v).trim();
                    el.add(new Option(cv, cv));
                });
            });
        }

        function syncICF(target) {
            const g = target.dataset.group, lv = target.dataset.lv, src = target.dataset.source;
            const list = getListBySource(src).slice(1);
            const major = document.querySelector(`select[data-group="${g}"][data-lv="major"]`);
            const middle = document.querySelector(`select[data-group="${g}"][data-lv="middle"]`);
            const minor = document.querySelector(`select[data-group="${g}"][data-lv="minor"]`);
            const val = String(target.value).trim();

            if (lv === 'major' && middle) {
                middle.innerHTML = '<option value="">-- 選択 --</option>';
                const filtered = list.filter(r => String(r[0]).trim() === val);
                [...new Set(filtered.map(r => r[1]))].filter(v => v).forEach(v => {
                    const cv = String(v).trim();
                    middle.add(new Option(cv, cv));
                });
                if (minor) minor.innerHTML = '<option value="">-- 選択 --</option>';
            } else if (lv === 'middle' && minor) {
                minor.innerHTML = '<option value="">-- 選択 --</option>';
                list.filter(r => String(r[0]).trim() === String(major.value).trim() && String(r[1]).trim() === val)
                    .forEach(r => { if(r[2]) {
                        const cv = String(r[2]).trim();
                        minor.add(new Option(cv, cv));
                    }});
            }
        }

        async function searchData() {
            const email = document.getElementById('search-email').value;
            if (!email) return alert("アドレスを入力");
            callGAS({ action: 'find', email: email }, async (res) => {
                if (!res || !res.data) return alert("過去データなし");
                document.getElementById('rowNum').value = res.rowNum;
                const data = res.data;

                // 通常フィールド
                document.querySelectorAll('#mainForm [name]').forEach(el => {
                    if (data[el.name] !== undefined && !el.dataset.lv) el.value = data[el.name];
                });

                // ICF連動：大→中→小を強制発火で再現
                const groups = [...new Set(Array.from(document.querySelectorAll('select[data-lv]')).map(el => el.dataset.group))];
                for (const g of groups) {
                    const major = document.querySelector(`select[data-group="${g}"][data-lv="major"]`);
                    const middle = document.querySelector(`select[data-group="${g}"][data-lv="middle"]`);
                    const minor = document.querySelector(`select[data-group="${g}"][data-lv="minor"]`);

                    if (major && data[major.name]) {
                        major.value = String(data[major.name]).trim();
                        syncICF(major); // 中項目を生成
                        await pollForValue(middle, String(data[middle.name]).trim());

                        if (middle && middle.value && data[minor.name]) {
                            syncICF(middle); // 小項目を生成
                            await pollForValue(minor, String(data[minor.name]).trim());
                        }
                    }
                }
                updateTotalCount();
                if (data["PDFリンク"]) {
                    const viewer = document.getElementById('pdf-viewer');
                    viewer.src = data["PDFリンク"].replace("/view", "/preview");
                    viewer.style.display = 'block';
                }
                alert("読み込み完了");
            });
        }

        function pollForValue(selectEl, targetValue) {
            return new Promise((resolve) => {
                let count = 0;
                const itv = setInterval(() => {
                    const opts = Array.from(selectEl.options).map(o => o.value);
                    if (opts.includes(targetValue)) {
                        selectEl.value = targetValue;
                        clearInterval(itv);
                        resolve();
                    } else if (count > 30) { // 最大3秒
                        clearInterval(itv);
                        resolve();
                    }
                    count++;
                }, 100);
            });
        }

        function getThumb(url) {
            if(!url) return "";
            const id = url.match(/[-\w]{25,}/);
            return id ? `https://drive.google.com/thumbnail?id=${id[0]}&sz=w1000` : "";
        }

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(e => e.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + id).style.display = 'block'; btn.classList.add('active');
        }

        function sendData() {
            const btn = document.querySelector('.btn-send');
            btn.disabled = true; btn.innerText = "送信中...";
            const payload = {};
            document.querySelectorAll('#mainForm [name]').forEach(el => { payload[el.name] = el.value; });
            fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) })
            .then(() => { alert("送信完了"); location.reload(); });
        }
    </script>
</body>
</html>
