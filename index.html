<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remote Therapist® Report System</title>

<style>
body { font-family: sans-serif; background:#f0f2f5; margin:0; padding-bottom:30px; }
.tab-menu { display:flex; position:sticky; top:0; background:#fff; border-bottom:1px solid #ddd; z-index:1000; }
.tab-btn { flex:1; padding:15px; border:none; background:none; font-weight:bold; cursor:pointer; color:#888; }
.tab-btn.active { border-bottom:3px solid #1a73e8; color:#1a73e8; }
.container { max-width:600px; margin:15px auto; background:#fff; padding:20px; border-radius:12px; box-shadow:0 2px 5px rgba(0,0,0,.1); }
.field-group { margin-bottom:30px; border-bottom:1px solid #eee; padding-bottom:20px; }
label { font-weight:bold; display:block; margin-top:10px; }
input, textarea, select { width:100%; padding:12px; margin-top:8px; border:1px solid #ccc; border-radius:8px; font-size:16px; }
.btn-send { width:100%; padding:18px; background:#1a73e8; color:#fff; border:none; border-radius:8px; font-size:18px; font-weight:bold; cursor:pointer; margin-top:20px; }
.search-area { background:#e8f0fe; padding:15px; border-radius:8px; margin-bottom:20px; border:1px solid #1a73e8; }
#loading { text-align:center; padding:40px; font-weight:bold; color:#666; }
.no-data-msg { color:#d93025; font-weight:bold; text-align:center; border:1px dashed #d93025; padding:10px; border-radius:6px; }
</style>
</head>

<body>

<div class="tab-menu">
  <button class="tab-btn active" onclick="switchTab('input',this)">報告入力</button>
  <button class="tab-btn" onclick="switchTab('face',this)">Face情報</button>
</div>

<div id="tab-input">
  <div class="container">

    <div class="search-area">
      <label>前回データ検索（メールアドレス）</label>
      <input type="email" id="search-email">
      <button class="btn-send" style="padding:10px;font-size:14px;" onclick="searchData()">検索</button>
    </div>

    <div id="loading">接続中...</div>

    <form id="mainForm" style="display:none;">
      <div id="fields"></div>
      <button type="button" class="btn-send" onclick="sendData()">報告を送信する</button>
    </form>

  </div>
</div>

<div id="tab-face" style="display:none;">
  <div class="container">
    <div id="face-img-area"></div>
  </div>
</div>

<script>
/* =============================
   設定
============================= */
const GAS_URL = "https://script.google.com/macros/s/AKfycbzzDReE4m4tv-xS0G0VmQTn6HDsnR_AeWXCNLHBYoruFhOpHKpjrpdDjQRSO0dWBmf2/exec";

const icf_data = { participation:[], activity:[], function:[] };
let currentConfig = [];

/* =============================
   JSONP 通信
============================= */
function callGAS(params, callback){
  const cb = "cb_" + Date.now();
  window[cb] = data => {
    callback(data);
    delete window[cb];
    document.body.removeChild(script);
  };
  const script = document.createElement("script");
  script.src = GAS_URL + "?" + Object.entries(params)
    .map(([k,v]) => `${k}=${encodeURIComponent(v)}`).join("&")
    + `&callback=${cb}`;
  document.body.appendChild(script);
}

/* =============================
   初期化
============================= */
window.onload = () => {
  callGAS({action:"init"}, data => {
    icf_data.participation = data.participation_lists || [];
    icf_data.activity = data.activity_lists || [];
    icf_data.function = data.function_lists || [];
    currentConfig = data.config || [];
    render(currentConfig);
    document.getElementById("loading").style.display="none";
    document.getElementById("mainForm").style.display="block";
  });
};

/* =============================
   描画
============================= */
function render(config){
  const fields = document.getElementById("fields");
  const faceArea = document.getElementById("face-img-area");
  fields.innerHTML = ""; faceArea.innerHTML="";

  config.forEach(row=>{
    const name=row[0], type=(row[1]||"").toLowerCase();
    if(!name || name==="項目名" || name==="PDFリンク") return;

    if(type==="face"||type==="movie"){
      const h=document.createElement("input");
      h.type="hidden"; h.name=name; h.id="hidden-"+name;
      fields.appendChild(h);
      const box=document.createElement("div");
      box.id="preview-"+name;
      faceArea.appendChild(box);
      return;
    }

    const g=document.createElement("div"); g.className="field-group";
    g.appendChild(Object.assign(document.createElement("label"),{innerText:name}));

    let el;
    if(type.includes("_major")||type.includes("_middle")||type.includes("_minor")){
      el=document.createElement("select");
      el.dataset.group=name.replace(/_ICF.*/,"");
      el.dataset.lv=type.split("_")[1];
      el.dataset.source=type.split("_")[0];
      el.onchange=e=>syncICF(e.target);
    }else if(type==="textarea"){
      el=document.createElement("textarea"); el.rows=4;
    }else{
      el=document.createElement("input"); el.type=type==="email"?"email":"text";
    }
    el.name=name;
    g.appendChild(el);
    fields.appendChild(g);
  });

  initICF();
}

/* =============================
   ICF
============================= */
function initICF(){
  document.querySelectorAll("select[data-lv='major']").forEach(sel=>{
    const list=icf_data[sel.dataset.source];
    sel.innerHTML="<option value=''>--選択--</option>";
    [...new Set(list.map(r=>String(r[0]).trim()))]
      .filter(v=>v).forEach(v=>sel.add(new Option(v,v)));
  });
}

function syncICF(t){
  const list=icf_data[t.dataset.source];
  const g=t.dataset.group;
  const major=document.querySelector(`select[data-group="${g}"][data-lv="major"]`);
  const middle=document.querySelector(`select[data-group="${g}"][data-lv="middle"]`);
  const minor=document.querySelector(`select[data-group="${g}"][data-lv="minor"]`);

  if(t.dataset.lv==="major" && middle){
    middle.innerHTML="<option value=''>--選択--</option>";
    if(minor) minor.innerHTML="<option value=''>--選択--</option>";
    list.filter(r=>String(r[0]).trim()===String(t.value).trim())
        .forEach(r=>{
          const v=String(r[1]).trim();
          if(v&&!Array.from(middle.options).some(o=>o.value===v))
            middle.add(new Option(v,v));
        });
  }

  if(t.dataset.lv==="middle" && minor){
    minor.innerHTML="<option value=''>--選択--</option>";
    list.filter(r=>
      String(r[0]).trim()===String(major.value).trim() &&
      String(r[1]).trim()===String(t.value).trim()
    ).forEach(r=>{
      const v=String(r[2]).trim();
      if(v) minor.add(new Option(v,v));
    });
  }
}

/* =============================
   検索
============================= */
function searchData(){
  const email=document.getElementById("search-email").value;
  if(!email) return alert("メールアドレス未入力");

  callGAS({action:"find",email}, data=>{
    if(!data) return alert("データなし");
    document.querySelectorAll("#mainForm [name]").forEach(el=>{
      if(data[el.name]!==undefined && !el.dataset.lv)
        el.value=data[el.name];
    });
    alert("読込完了");
  });
}

/* =============================
   送信
============================= */
function sendData(){
  if(!confirm("送信しますか？")) return;

  const payload={};
  document.querySelectorAll("#mainForm [name]").forEach(el=>{
    payload[el.name]=el.value;
  });

  callGAS(
    {action:"save",payload:JSON.stringify(payload)},
    res=>{
      if(!res||!res.pdfUrl) return alert("PDF作成失敗");
      const o=document.createElement("div");
      o.style="position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;";
      o.innerHTML=`<h2>送信完了</h2><a href="${res.pdfUrl}" target="_blank">PDFを開く</a>`;
      document.body.appendChild(o);
    }
  );
}

function switchTab(id,btn){
  document.querySelectorAll("[id^='tab-']").forEach(e=>e.style.display="none");
  document.getElementById("tab-"+id).style.display="block";
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}
</script>

</body>
</html>
